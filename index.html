<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creative Profile Page</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #89f7fe, #66a6ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 900px;
      display: flex;
      overflow: hidden;
      transition: transform 0.4s ease;
    }

    .profile-container:hover {
      transform: scale(1.02);
    }

    .profile-photo {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1.2;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .profile-info h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #333;
    }

    .profile-info h3 {
      font-weight: 400;
      margin-bottom: 20px;
      color: #666;
    }

    .profile-info p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #444;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: linear-gradient(135deg, #66a6ff, #89f7fe);
      color: #fff;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      transform: scale(1.1);
    }

    .social-links {
      margin-top: 25px;
    }

    .social-links a {
      margin: 0 10px;
      text-decoration: none;
      color: #66a6ff;
      font-size: 20px;
      transition: color 0.3s, transform 0.3s;
    }

    .social-links a:hover {
      color: #333;
      transform: scale(1.2);
    }
    .profile-photo img {
  width: 350px;
  height: 350px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #f5ff66;
}
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-photo">
      <img src="shailendra2.jpg" alt="Profile Photo">
    </div>
    <div class="profile-info">
      <h1>Shailendra Singh</h1>
      <h3>Web Developer & Software Developer</h3>
      <p>
        I craft interactive, visually stunning web experiences with a focus on clean design and smooth user journeys. Skilled in HTML, CSS, and JAVA script.
      </p>
      <a href="#" class="btn">Explore Portfolio</a>
      <div class="social-links">
        <a href="https://www.linkedin.com/feed/">LinkedIn</a>
        <a href="https://github.com/Shailu-Singh/Profile">GitHub</a>
        <a href="https://www.youtube.com/">YouTube</a>
      </div>
    </div>
  </div>
</body>
</html>
